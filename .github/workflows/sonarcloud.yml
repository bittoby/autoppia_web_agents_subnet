name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # Required for PR comments
      issues: write  # Required for issue comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('webs_server/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r webs_server/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Audit (pip-audit)
        run: |
          pip install pip-audit
          mkdir -p reports
          pip-audit -f json 2>/dev/null > reports/pip-audit.json || true

      - name: Count (direct deps vulns)
        id: pip_audit
        run: |
          count=$(python .github/scripts/pip_audit_count.py)
          echo "pip_audit_vuln_count=$count" >> "$GITHUB_OUTPUT"
          echo "Direct dependency vulnerabilities: $count"

      - name: List (pip-audit table)
        if: steps.pip_audit.outputs.pip_audit_vuln_count != '0'
        run: pip-audit

      - name: Fail if direct deps have vulnerabilities
        if: steps.pip_audit.outputs.pip_audit_vuln_count != '0'
        run: |
          echo "::error::Dependency vulnerabilities found (pip-audit: ${{ steps.pip_audit.outputs.pip_audit_vuln_count }}). Fix them before merging."
          exit 1

      - name: Run tests with coverage
        working-directory: webs_server
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-report=term

      - name: Ensure coverage report exists for SonarCloud
        working-directory: webs_server
        run: |
          if [ ! -f coverage.xml ]; then
            echo "Creating minimal coverage.xml (tests may have failed)"
            printf '%s\n' '<?xml version="1.0" ?>' '<coverage line-rate="0" branch-rate="0" lines-covered="0" lines-valid="1" branches-covered="0" branches-valid="0" version="1.9" timestamp="0">' '<sources><source>.</source></sources>' '<packages/>' '</coverage>' > coverage.xml
          fi

      - name: OWASP Dependency-Check (SARIF for SonarCloud)
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "autoppia_webs_demo"
          path: "webs_server"
          format: "SARIF"
          out: "reports"
#        continue-on-error: true  # Do not fail job if dependency-check fails (e.g. network)

      - name: Normalize SARIF report for SonarCloud
        id: sarif
        run: |
          mkdir -p reports
          for f in reports/*.sarif; do
            [ -e "$f" ] && cp "$f" reports/dependency-check-report.sarif && break
          done
          ls -la reports/
          if [ -f reports/dependency-check-report.sarif ]; then
            echo "has_sarif=true" >> "$GITHUB_OUTPUT"
            echo "SARIF size: $(wc -c < reports/dependency-check-report.sarif) bytes"
            if command -v jq >/dev/null 2>&1; then
              n=$(jq '[.runs[]?.results[]?] | length' reports/dependency-check-report.sarif 2>/dev/null || echo "0")
              echo "SARIF findings (results): $n"
            fi
          else
            echo "has_sarif=false" >> "$GITHUB_OUTPUT"
            echo "No SARIF file found (OWASP step may have failed or found no vulnerabilities)"
          fi

      - name: Upload SARIF reports (debug)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-reports
          path: reports/
          retention-days: 5

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.branch.name=${{ github.ref_name }}
            ${{ steps.sarif.outputs.has_sarif == 'true' && '-Dsonar.sarifReportPaths=reports/dependency-check-report.sarif' || '' }}
