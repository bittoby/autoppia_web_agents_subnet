# SonarCloud analysis for autoppia_web_agents_subnet (repo root layout: requirements.txt, autoppia_web_agents_subnet/, tests/)
name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=78.1.1"
          pip install -r requirements.txt
          pip install "bittensor==9.9.0"
          pip install -e .
          pip install pytest-cov

      - name: Audit (pip-audit)
        run: |
          pip install pip-audit
          mkdir -p reports
          pip-audit -f json 2>/dev/null > reports/pip-audit.json || true

      - name: Count (direct deps vulns)
        id: pip_audit
        run: |
          count=$(python .github/scripts/pip_audit_count.py)
          echo "pip_audit_vuln_count=$count" >> "$GITHUB_OUTPUT"
          echo "Direct dependency vulnerabilities: $count"

      - name: List (pip-audit table)
        if: steps.pip_audit.outputs.pip_audit_vuln_count != '0'
        run: pip-audit

      - name: Fail if direct deps have vulnerabilities
        if: steps.pip_audit.outputs.pip_audit_vuln_count != '0'
        run: |
          echo "::error::Dependency vulnerabilities found (pip-audit: ${{ steps.pip_audit.outputs.pip_audit_vuln_count }}). Fix them before merging."
          exit 1

      - name: Ensure setuptools (pkg_resources) for bittensor/munch
        run: pip install "setuptools>=78.1.1"

      - name: Run tests with coverage
        env:
          VALIDATOR_NAME: sonar-ci
          VALIDATOR_IMAGE: sonar-ci
        run: |
          pytest tests/ --cov=autoppia_web_agents_subnet --cov-report=xml --cov-report=term -q

      - name: Ensure coverage report exists for SonarCloud
        run: |
          if [ ! -f coverage.xml ]; then
            echo "Creating minimal coverage.xml (tests may have failed)"
            printf '%s\n' '<?xml version="1.0" ?>' '<coverage line-rate="0" branch-rate="0" lines-covered="0" lines-valid="1" branches-covered="0" branches-valid="0" version="1.9" timestamp="0">' '<sources><source>.</source></sources>' '<packages/>' '</coverage>' > coverage.xml
          fi

      - name: OWASP Dependency-Check (SARIF for SonarCloud)
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "autoppia_web_agents_subnet"
          path: "."
          format: "SARIF"
          out: "reports"
        continue-on-error: true

      - name: Normalize SARIF report for SonarCloud
        id: sarif
        run: |
          mkdir -p reports
          for f in reports/*.sarif; do
            [ -e "$f" ] && cp "$f" reports/dependency-check-report.sarif && break
          done
          if [ -f reports/dependency-check-report.sarif ]; then
            echo "has_sarif=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_sarif=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF reports (debug)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-reports
          path: reports/
          retention-days: 5

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.branch.name=${{ github.ref_name }}
            ${{ steps.sarif.outputs.has_sarif == 'true' && '-Dsonar.sarifReportPaths=reports/dependency-check-report.sarif' || '' }}
