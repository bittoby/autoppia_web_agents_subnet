# SonarCloud / SonarQube analysis configuration
# Use locally with: pysonar (after setting SONAR_TOKEN and optionally below)
#
# Required for SonarCloud (set here or via env):
#   - sonar.organization  → Your SonarCloud org key (e.g. from sonarcloud.io)
#   - sonar.projectKey     → Project key (e.g. org_autoppia-web-agents-subnet)
# Get/create project key: SonarCloud → Your project → Administration → General
# Token: SonarCloud → My Account → Security → Generate Token

sonar.projectKey=autoppia-web-agents-subnet
sonar.organization=
sonar.projectName=autoppia-web-agents-subnet

# Sources and tests (paths relative to this file)
sonar.sources=autoppia_web_agents_subnet
sonar.tests=tests
sonar.python.version=3.11

# Coverage report produced by: pytest --cov=autoppia_web_agents_subnet --cov-report=xml
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions (optional) - align with coverage omit so quality gate reflects testable code
sonar.exclusions=**/__pycache__/**,**/.git/**,**/seed.py,**/console.py,\
**/base/neuron.py,**/base/validator.py,**/base/miner.py,**/bittensor_config.py,\
**/miner/cli.py,**/miner/help.py,**/miner/ui.py,**/miner/service.py,**/miner/utils.py,\
**/platform/client.py,**/opensource/gateway/main.py,**/opensource/utils_docker.py,**/opensource/utils_git.py,\
**/base/utils/config.py,**/base/utils/logging.py,**/platform/validator_mixin.py,\
**/platform/mixin.py,**/platform/utils/round_flow.py,**/platform/utils/task_flow.py,**/platform/utils/iwa_core.py,\
**/validator/evaluation/mixin.py,**/validator/round_start/mixin.py,**/validator/settlement/consensus.py,\
**/validator/settlement/mixin.py,**/validator/season_manager.py,**/validator/evaluation/tasks.py,\
**/validator/evaluation/stateful_cua_eval.py,**/validator/reporting/mixin.py,\
**/validator/visualization/stats.py,**/validator/visualization/weights_table.py,**/validator/visualization/round_table.py,\
**/opensource/sandbox_manager.py,**/utils/dendrite.py
